<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vibehack - Ghost Terminal</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { 
            background-color: #121212; 
            color: #00ff00; 
            font-family: monospace; 
            padding: 20px; 
            max-width: 800px;
            margin: 0 auto;
        }
        #chat-box { 
            height: 400px; 
            border: 1px solid #333; 
            background: #0a0a0a;
            overflow-y: auto; /* Enables scrolling */
            padding: 15px; 
            margin-bottom: 15px; 
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        input, button { 
            background: #222; 
            color: #00ff00; 
            border: 1px solid #555; 
            padding: 10px; 
            outline: none;
        }
        button:hover { background: #333; cursor: pointer; }
        
        /* Message Styling */
        .msg-system { color: #888; font-style: italic; }
        .msg-me { color: #00ffff; text-align: right; }
        .msg-other { color: #00ff00; }
        .msg-whisper { color: #ff00ff; font-weight: bold; }
    </style>
</head>
<body>

    <h2>👻 Vibehack Terminal v2.0</h2>
    
    <div class="controls">
        <input type="text" id="roomInput" placeholder="Room Name" value="Lobby">
        <input type="text" id="permUser" placeholder="Your Permanent ID" value="TestUser1">
        <button onclick="joinRoom()" id="joinBtn">Enter the Void</button>
    </div>

    <div id="chat-box"></div>

    <div class="controls">
        <input type="text" id="messageInput" placeholder="Type a message and press Enter..." style="flex-grow: 1;" disabled>
        <button onclick="sendMessage()" id="sendBtn" disabled>Send</button>
    </div>

    <script>
        const socket = io("http://localhost:8000");
        let myGhostName = "";

        // --- 1. Event Listeners for the "Enter" Key ---
        
        const messageInput = document.getElementById("messageInput");
        
        // Listen for "Enter" on the message input
        messageInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // Prevent default browser behavior
                sendMessage();
            }
        });

        // Optional: Listen for "Enter" on the room login as well
        document.getElementById("permUser").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                joinRoom();
            }
        });

        // --- 2. Socket Events ---

        socket.on("connect", () => {
            appendMessage("Connected to server. Ready to join a room.", "msg-system");
        });

        socket.on("system_message", (data) => {
            appendMessage(`⚙️ ${data.msg}`, "msg-system");
        });

        socket.on("receive_message", (data) => {
            // Determine if the message is from YOU or someone else
            const isMe = data.sender === myGhostName;
            
            let cssClass = "msg-other";
            let prefix = `[${data.sender}]:`;

            if (isMe) {
                cssClass = "msg-me";
                prefix = `[You - ${data.sender}]:`;
            }

            if (data.is_whisper) {
                cssClass = "msg-whisper";
                prefix = `🤫 WHISPER from [${data.sender}]:`;
            }

            appendMessage(`${prefix} ${data.message}`, cssClass);
        });

        // --- 3. Core Functions ---

        function joinRoom() {
            const roomName = document.getElementById("roomInput").value;
            const permUser = document.getElementById("permUser").value;
            
            if (!roomName || !permUser) {
                alert("Room and Permanent ID are required.");
                return;
            }

            socket.emit("join_room", { 
                room_name: roomName, 
                category: "Testing", 
                permanent_username: permUser 
            }, (response) => {
                myGhostName = response.username;
                
                // Enable the chat input now that we are in a room
                document.getElementById("messageInput").disabled = false;
                document.getElementById("sendBtn").disabled = false;
                document.getElementById("messageInput").focus();
                
                // Disable login inputs
                document.getElementById("joinBtn").disabled = true;
                document.getElementById("roomInput").disabled = true;
                document.getElementById("permUser").disabled = true;

                appendMessage(`✅ Access granted. Your temporary identity is: ${myGhostName}`, "msg-system");
            });
        }

        function sendMessage() {
            const msg = messageInput.value.trim();
            
            // Prevent sending empty lines
            if (msg === "") return; 

            // Emit the message to the backend
            socket.emit("send_message", { message: msg });
            
            // Instantly clear the input box so the user can type again
            messageInput.value = "";
            messageInput.focus();
        }

        // --- 4. UI Helper: Append and Auto-Scroll ---
        function appendMessage(text, className) {
            const chatBox = document.getElementById("chat-box");
            
            const div = document.createElement("div");
            div.textContent = text;
            div.className = className;
            
            chatBox.appendChild(div);
            
            // Auto-scroll to the bottom every time a new message appears
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
